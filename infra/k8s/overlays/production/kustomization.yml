apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

namespace: oci-devops-lab

images:
  - name: REGISTRY/backend
    newName: sa-bogota-1.ocir.io/TENANCY/backend
    newTag: latest
  - name: REGISTRY/frontend
    newName: sa-bogota-1.ocir.io/TENANCY/frontend
    newTag: latest

# Production: mas replicas, mas recursos
patches:
  - target:
      kind: Deployment
      name: backend
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 3
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: "500m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: "1000m"
  - target:
      kind: Deployment
      name: frontend
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 3

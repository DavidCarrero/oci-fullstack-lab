sonar.projectKey=oci-devops-lab
sonar.projectName=OCI DevOps Lab
sonar.projectVersion=1.0.0

# Monorepo: analizar ambas apps
sonar.sources=apps/frontend/src,apps/backend/src
sonar.tests=apps/frontend/__tests__,apps/backend/src,apps/backend/test
sonar.test.inclusions=**/*.spec.ts,**/*.test.tsx,**/*.e2e-spec.ts
sonar.exclusions=**/node_modules/**,**/dist/**,**/.next/**,**/coverage/**

# Cobertura
sonar.javascript.lcov.reportPaths=apps/frontend/coverage/lcov.info,apps/backend/coverage/lcov.info

# Lenguaje
sonar.language=ts
sonar.sourceEncoding=UTF-8
